version: "3.9"

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dataextractor
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://root:root@db:3306/dataextractor
      UPLOAD_DIR: /tmp/pdf_uploads
      DEBUG: "false"
      TESSERACT_CMD: /usr/bin/tesseract
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /tmp/pdf_uploads:/tmp/pdf_uploads

volumes:
  mysql_data:
